# ============================================================
# AI Engineer Hotlist — 全局配置
# ============================================================

# --- 输出 ---
output:
  html: "docs/index.html"       # 生成的 HTML 路径（GitHub Pages 用 docs/）
  json: "docs/data.json"         # 原始数据快照

# --- 企业微信机器人 Webhook ---
# 从 https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx 获取
# 建议通过 GitHub Secrets 传入: WECOM_WEBHOOK_KEY
wecom:
  webhook_url: ""               # 留空 = 不推送
  # webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY_HERE"

# --- 各数据源开关 & 参数 ---
sources:
  github:
    enabled: true
    languages: ["python", "typescript", "rust", "go", "jupyter%20notebook"]
    max_items: 15

  hackernews:
    enabled: true
    # 搜 AI/ML/DL/LLM 相关关键词
    keywords: ["AI", "artificial intelligence", "machine learning", "deep learning",
               "LLM", "large language model", "GPT", "transformer", "neural network",
               "diffusion", "agent", "RAG", "fine-tuning", "open source AI"]
    max_items: 20
    min_score: 10               # HN 最低分

  reddit:
    enabled: true               # 通过 Reddit 公开 JSON API,无需凭证
    subreddits:
      - "MachineLearning"
      - "LocalLLaMA"
      - "artificial"
      - "OpenAI"
      - "StableDiffusion"
    max_items: 20
    min_score: 10

  twitter:
    enabled: true
    # nitter 实例列表（哪个能访问用哪个）
    nitter_instances:
      - "https://nitter.net"
      - "https://nitter.1d4.us"
      - "https://nitter.kavin.rocks"
    # 关注的 AI Engineer 领域账号
    accounts:
      - "karpathy"
      - "ylecun"
      - "AndrewYNg"
      - "goodfellow_ian"
      - "fchollet"
      - "DrJimFan"
      - "jennywang313"
      - "alexgraveley"
      - "lmsysorg"
      - "huggingface"
      - "OpenAI"
      - "DeepLearningAI"
      - "LangChainAI"
      - "xai"
    max_items: 30

  arxiv:
    enabled: true
    # 按 arXiv 分类
    categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
      - "cs.CV"
    max_items: 20
    # 只取最近 N 天的新论文
    recent_days: 1

  media_rss:
    enabled: true
    feeds:
      - name: "TechCrunch AI"
        url: "https://techcrunch.com/category/artificial-intelligence/feed/"
      - name: "The Verge AI"
        url: "https://www.theverge.com/ai-artificial-intelligence/rss.xml"
      - name: "MIT Tech Review AI"
        url: "https://www.technologyreview.com/topic/artificial-intelligence/feed/"
    max_items: 15

  cn_social:
    enabled: true
    # 通过 RSSHub 桥接中文源
    # 自建 RSSHub 地址优先,公共实例可能被限
    rsshub_base: "https://rsshub.app"
    sources:
      - name: "知乎 AI 话题热门"
        type: "zhihu-topic"
        id: "19559427"          # AI 话题 ID
      - name: "知乎每日热门"
        type: "zhihu-daily"
      - name: "36氪 AI 最新"
        type: "36kr"
      - name: "虎嗅 最新"
        type: "huxiu"
    max_items: 20

# --- 热点过滤 ---
filter:
  # 热度分计算公式: base_score * (1 + boost_factor)
  # base_score 各源自带(star/upvote/score),boost_factor 来自:
  boost_rules:
    # 含这些关键词的,热度 +50%
    keyword_boost: ["GPT-5", "Claude", "Cursor", "Copilot", "Llama 4",
                    "Sora", "AGI", "open source", "breakthrough"]
    keyword_boost_factor: 0.5
    # 含这些词的热度 +20%
    keyword_medium: ["agent", "framework", "fine-tune", "RAG", "deploy",
                     "benchmark", "dataset", "release", "paper"]
    keyword_medium_factor: 0.2

  # 只保留过去 N 小时内的内容(设为 0 则不过滤)
  recent_hours: 24

  # 去重窗口:相同标题/URL 在 N 小时内只保留一条
  dedup_hours: 48

  # 最终保留的最大条目数
  max_total: 80
